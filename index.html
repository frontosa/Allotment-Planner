<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Allotment & Garden Sowing Planner</title>
  
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Load React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Load Babel to compile JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* Custom Scrollbar hiding for the month navigation */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    body { background-color: #f3f6f4; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Inline SVG Icons (Replacing lucide-react for single-file compatibility) ---
    const IconSprout = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/></svg>;
    const IconSun = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
    const IconTractor = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m10 11 11 .9c.6 0 .9.5.8 1.1l-.8 5h-1"/><path d="M16 18h-5"/><path d="M18 5a1 1 0 0 0-1 1v5.57l-3-2.97"/><path d="M3 4h9l1 7.24"/><circle cx="7" cy="15" r="4"/><circle cx="18" cy="16" r="2"/></svg>;
    const IconBasket = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 11-1 9"/><path d="m19 11-4-7"/><path d="M2 11h20"/><path d="m3.5 11 1.6 7.4a2 2 0 0 0 2 1.6h9.8a2 2 0 0 0 2-1.6l1.7-7.4"/><path d="M4.5 15.5h15"/><path d="m5 11 4-7"/><path d="m9 11 1 9"/></svg>;
    const IconInfo = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
    const IconCalendar = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>;
    const IconChevronLeft = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>;
    const IconChevronRight = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
    const IconSparkles = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;
    const IconChef = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 21a1 1 0 0 0 1-1v-5.35c0-.457.316-.844.727-1.041a4 4 0 0 0-2.134-7.589v-.01A4 4 0 0 0 9 4a4 4 0 0 0-7.593 2.02A4 4 0 0 0 4.273 13.6c.411.197.727.584.727 1.041V20a1 1 0 0 0 1 1Z"/><path d="M6 17h12"/></svg>;
    const IconList = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg>;
    const IconLoader = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;

    // --- Monthly Data ---
    const plannerData = {
      January: {
        sowIndoors: [{ name: "Chillies & Peppers", icon: "🌶️" }, { name: "Aubergines", icon: "🍆" }, { name: "Onions", icon: "🧅" }, { name: "Leeks (early)", icon: "🥬" }],
        sowOutdoors: [{ name: "Broad beans (mild areas)", icon: "🫘" }],
        plantOut: [{ name: "Garlic", icon: "🧄" }, { name: "Bare-root fruit trees", icon: "🌳" }],
        harvest: [{ name: "Parsnips", icon: "🥕" }, { name: "Leeks", icon: "🥬" }, { name: "Kale", icon: "🥬" }, { name: "Brussels Sprouts", icon: "🥦" }, { name: "Winter Cabbage", icon: "🥬" }],
        tip: "Plan your seed orders for the year. Keep off the soil if it's wet or frozen to protect its structure."
      },
      February: {
        sowIndoors: [{ name: "Tomatoes (late Feb)", icon: "🍅" }, { name: "Broad Beans", icon: "🫘" }, { name: "Early Peas", icon: "🟢" }, { name: "Spinach", icon: "🍃" }, { name: "Radish", icon: "🔴" }],
        sowOutdoors: [{ name: "Broad beans (under cloche)", icon: "🫘" }],
        plantOut: [{ name: "Fruit bushes", icon: "🫐" }],
        harvest: [{ name: "Kale", icon: "🥬" }, { name: "Brussels Sprouts", icon: "🥦" }, { name: "Leeks", icon: "🥬" }, { name: "Parsnips", icon: "🥕" }],
        tip: "Start 'chitting' early potatoes indoors in a cool, light place. Multisow module trays with early beetroot and onions."
      },
      March: {
        sowIndoors: [{ name: "Celery & Celeriac", icon: "🥬" }, { name: "Cucumbers", icon: "🥒" }, { name: "Lettuce & Salads", icon: "🥗" }, { name: "Tomatoes", icon: "🍅" }],
        sowOutdoors: [{ name: "Carrots (early)", icon: "🥕" }, { name: "Parsnips", icon: "🥕" }, { name: "Radish", icon: "🔴" }, { name: "Spinach", icon: "🍃" }, { name: "Peas", icon: "🟢" }],
        plantOut: [{ name: "Onion Sets", icon: "🧅" }, { name: "Early Potatoes", icon: "🥔" }, { name: "Broad Beans", icon: "🫘" }],
        harvest: [{ name: "Leeks", icon: "🥬" }, { name: "Kale", icon: "🥬" }, { name: "Overwintered Spring Onions", icon: "🧅" }],
        tip: "Warm the soil outdoors by covering beds with cloches or fleece a few weeks before sowing directly."
      },
      April: {
        sowIndoors: [{ name: "Courgettes & Squash", icon: "🥒" }, { name: "Pumpkins", icon: "🎃" }, { name: "Sweetcorn", icon: "🌽" }, { name: "Runner & French Beans", icon: "🫘" }],
        sowOutdoors: [{ name: "Carrots", icon: "🥕" }, { name: "Beetroot", icon: "🟣" }, { name: "Peas", icon: "🟢" }, { name: "Lettuce & Chard", icon: "🥬" }],
        plantOut: [{ name: "Maincrop Potatoes", icon: "🥔" }, { name: "Peas (module raised)", icon: "🟢" }, { name: "Cabbages", icon: "🥬" }],
        harvest: [{ name: "Asparagus", icon: "🎋" }, { name: "Radish", icon: "🔴" }, { name: "Spring Cabbage", icon: "🥬" }, { name: "Rhubarb", icon: "🥧" }],
        tip: "Keep an eye on the weather forecast. Be prepared to protect early outdoor sowings from late frosts with horticultural fleece."
      },
      May: {
        sowIndoors: [{ name: "Melons", icon: "🍈" }, { name: "Succession Salads", icon: "🥗" }],
        sowOutdoors: [{ name: "Runner & French Beans", icon: "🫘" }, { name: "Sweetcorn", icon: "🌽" }, { name: "Carrots & Beetroot", icon: "🥕" }, { name: "Courgettes (late May)", icon: "🥒" }],
        plantOut: [{ name: "Tomatoes (Greenhouse)", icon: "🍅" }, { name: "Peppers & Aubergines", icon: "🌶️" }, { name: "Sweetcorn", icon: "🌽" }, { name: "Courgettes & Squash", icon: "🥒" }],
        harvest: [{ name: "Asparagus", icon: "🎋" }, { name: "Early Salads", icon: "🥗" }, { name: "Radish", icon: "🔴" }, { name: "Spinach", icon: "🍃" }],
        tip: "Wait until the last frost has completely passed before planting out tender crops like tomatoes, courgettes, and beans."
      },
      June: {
        sowIndoors: [{ name: "Winter Cabbage", icon: "🥬" }, { name: "Kale", icon: "🥬" }],
        sowOutdoors: [{ name: "Succession Carrots", icon: "🥕" }, { name: "Beetroot", icon: "🟣" }, { name: "Salads & Radish", icon: "🥗" }, { name: "Florence Fennel", icon: "🌿" }],
        plantOut: [{ name: "Outdoor Tomatoes", icon: "🍅" }, { name: "Pumpkins & Squash", icon: "🎃" }, { name: "Leeks", icon: "🥬" }, { name: "Winter Brassicas", icon: "🥦" }],
        harvest: [{ name: "Early Potatoes", icon: "🥔" }, { name: "Broad Beans & Peas", icon: "🟢" }, { name: "Garlic (late June)", icon: "🧄" }, { name: "Strawberries", icon: "🍓" }],
        tip: "Harvest garlic when the lower leaves start to turn yellow and dry. Water deeply but infrequently during dry spells."
      },
      July: {
        sowIndoors: [{ name: "Spring Cabbage", icon: "🥬" }],
        sowOutdoors: [{ name: "Turnips", icon: "⚪" }, { name: "Winter Radishes", icon: "🔴" }, { name: "Chicory & Endive", icon: "🥬" }, { name: "Lettuce", icon: "🥗" }],
        plantOut: [{ name: "Winter Brassicas", icon: "🥬" }, { name: "Leeks", icon: "🥬" }],
        harvest: [{ name: "Maincrop Potatoes", icon: "🥔" }, { name: "Onions & Garlic", icon: "🧅" }, { name: "Courgettes & Beans", icon: "🥒" }, { name: "Tomatoes", icon: "🍅" }],
        tip: "Keep newly planted brassicas netted against cabbage white butterflies. Feed tomatoes with a high-potash liquid feed."
      },
      August: {
        sowIndoors: [{ name: "Winter Salads", icon: "🥗" }],
        sowOutdoors: [{ name: "Winter Salads", icon: "🍃" }, { name: "Spinach", icon: "🍃" }, { name: "Spring Onions", icon: "🧅" }, { name: "Turnips", icon: "⚪" }],
        plantOut: [{ name: "Spring Cabbage", icon: "🥬" }],
        harvest: [{ name: "Tomatoes & Cucumbers", icon: "🍅" }, { name: "Courgettes", icon: "🥒" }, { name: "Sweetcorn", icon: "🌽" }, { name: "Aubergines & Peppers", icon: "🍆" }],
        tip: "Harvest courgettes and runner beans constantly. The more you pick, the more they produce! Dry onions in the sun."
      },
      September: {
        sowIndoors: [{ name: "Overwintering Salads", icon: "🥗" }],
        sowOutdoors: [{ name: "Overwintering Onions", icon: "🧅" }, { name: "Spinach", icon: "🍃" }, { name: "Winter Radish", icon: "🔴" }],
        plantOut: [{ name: "Spring Cabbage", icon: "🥬" }, { name: "Strawberry runners", icon: "🍓" }],
        harvest: [{ name: "Pumpkins & Squash", icon: "🎃" }, { name: "Maincrop Potatoes", icon: "🥔" }, { name: "Apples & Pears", icon: "🍏" }, { name: "Sweetcorn & Beans", icon: "🌽" }],
        tip: "Leave pumpkins and squash on the vine to cure in the sun before storing to harden their skins."
      },
      October: {
        sowIndoors: [{ name: "Broad Beans (late Oct)", icon: "🫘" }],
        sowOutdoors: [{ name: "Broad Beans", icon: "🫘" }, { name: "Peas (hardy varieties)", icon: "🟢" }, { name: "Garlic", icon: "🧄" }],
        plantOut: [{ name: "Garlic Cloves", icon: "🧄" }, { name: "Autumn Onion Sets", icon: "🧅" }],
        harvest: [{ name: "Pumpkins & Squash", icon: "🎃" }, { name: "Apples", icon: "🍏" }, { name: "Root Crops", icon: "🥕" }, { name: "Leeks & Kale", icon: "🥬" }],
        tip: "Clear finished crops and mulch beds with a thick layer of compost (No Dig method) to prepare soil for next spring."
      },
      November: {
        sowIndoors: [{ name: "Microgreens", icon: "🌱" }],
        sowOutdoors: [{ name: "Garlic", icon: "🧄" }, { name: "Broad Beans", icon: "🫘" }],
        plantOut: [{ name: "Bare-root fruit bushes", icon: "🫐" }, { name: "Tulips", icon: "🌷" }],
        harvest: [{ name: "Parsnips", icon: "🥕" }, { name: "Leeks", icon: "🥬" }, { name: "Kale", icon: "🥬" }, { name: "Winter Cabbage & Sprouts", icon: "🥦" }],
        tip: "Plant garlic cloves now; they need a period of cold weather to split into individual cloves and form bulbs."
      },
      December: {
        sowIndoors: [{ name: "Microgreens", icon: "🌱" }],
        sowOutdoors: [{ name: "None - rest the soil!", icon: "❄️" }],
        plantOut: [{ name: "Bare-root fruit trees", icon: "🌳" }],
        harvest: [{ name: "Parsnips", icon: "🥕" }, { name: "Leeks", icon: "🥬" }, { name: "Brussels Sprouts", icon: "🥦" }, { name: "Winter Cabbage", icon: "🥬" }],
        tip: "Harvest parsnips after the first frost, as the cold converts their starches to sugars, giving a sweeter flavour."
      }
    };

    const months = Object.keys(plannerData);

    function App() {
      const [currentMonthIndex, setCurrentMonthIndex] = useState(new Date().getMonth());
      const [aiLoading, setAiLoading] = useState(false);
      const [aiResponse, setAiResponse] = useState(null);
      const [aiError, setAiError] = useState(null);
      
      // API Key State
      const [showApiKeyModal, setShowApiKeyModal] = useState(false);
      const [apiKeyInput, setApiKeyInput] = useState("");
      const [pendingAction, setPendingAction] = useState(null); // 'recipe' or 'chores'

      const currentMonth = months[currentMonthIndex];
      const data = plannerData[currentMonth];

      const handlePrevMonth = () => {
        setCurrentMonthIndex((prev) => (prev === 0 ? 11 : prev - 1));
        setAiResponse(null);
        setAiError(null);
      };

      const handleNextMonth = () => {
        setCurrentMonthIndex((prev) => (prev === 11 ? 0 : prev + 1));
        setAiResponse(null);
        setAiError(null);
      };

      // --- AI Functions ---
      const executeAiAction = (actionType) => {
        const storedKey = localStorage.getItem('gemini_api_key');
        if (!storedKey) {
          setPendingAction(actionType);
          setShowApiKeyModal(true);
          return;
        }

        if (actionType === 'recipe') generateRecipe(storedKey);
        if (actionType === 'chores') generateChores(storedKey);
      };

      const saveApiKeyAndContinue = () => {
        if (!apiKeyInput.trim()) return;
        localStorage.setItem('gemini_api_key', apiKeyInput.trim());
        setShowApiKeyModal(false);
        if (pendingAction) {
          executeAiAction(pendingAction);
          setPendingAction(null);
        }
      };

      const callGemini = async (prompt, systemPrompt, apiKey) => {
        setAiLoading(true);
        setAiResponse(null);
        setAiError(null);

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              systemInstruction: { parts: [{ text: systemPrompt }] }
            })
          });
          
          if (!response.ok) {
            if (response.status === 400) throw new Error("Invalid API Key. Please click 'Clear API Key' and try again.");
            throw new Error(`API Error: ${response.status}`);
          }
          
          const result = await response.json();
          const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (text) {
            setAiResponse(text);
          } else {
            throw new Error("No response generated.");
          }
        } catch (error) {
          setAiError(error.message || "Sorry, the AI gardener is resting. Please check your API key and try again.");
        } finally {
          setAiLoading(false);
        }
      };

      const generateRecipe = (apiKey) => {
        const harvestItems = data.harvest.map(item => item.name).join(", ");
        if (!harvestItems) {
          setAiResponse("It looks like there's nothing ready to harvest this month! Time to focus on sowing.");
          return;
        }
        const prompt = `I have just harvested: ${harvestItems}. Suggest a single, delicious seasonal recipe. Keep it concise. Include a catchy title, extra pantry ingredients needed, and 3-4 simple steps.`;
        const systemPrompt = "You are an enthusiastic farm-to-table chef.";
        callGemini(prompt, systemPrompt, apiKey);
      };

      const generateChores = (apiKey) => {
        const indoors = data.sowIndoors.map(i => i.name).join(", ") || "Nothing";
        const outdoors = data.sowOutdoors.map(i => i.name).join(", ") || "Nothing";
        const plantingOut = data.plantOut.map(i => i.name).join(", ") || "Nothing";
        const prompt = `It is ${currentMonth} in the UK. Tasks: Sow indoors: ${indoors}. Sow outdoors: ${outdoors}. Plant out: ${plantingOut}. Create a prioritized weekend to-do list based on these tasks. Add one brief 'No Dig' gardening tip at the end.`;
        const systemPrompt = "You are a pragmatic 'No Dig' gardener helping an allotment holder organize their weekend.";
        callGemini(prompt, systemPrompt, apiKey);
      };

      const clearApiKey = () => {
        localStorage.removeItem('gemini_api_key');
        setApiKeyInput("");
        setAiResponse(null);
        setAiError("API Key cleared. Click a button to enter a new one.");
      };

      // Helper to safely render markdown-like text
      const formatText = (text) => {
        return text.split('\n').map((line, i) => {
          if (!line.trim()) return <br key={i} className="h-2" />;
          const parts = line.split(/(\*\*.*?\*\*)/g);
          return (
            <p key={i} className="mb-2 text-gray-700 leading-relaxed">
              {parts.map((part, j) => 
                part.startsWith('**') && part.endsWith('**') 
                  ? <strong key={j} className="text-gray-900 font-bold">{part.slice(2, -2)}</strong> 
                  : part.replace(/\*/g, '')
              )}
            </p>
          );
        });
      };

      const ActionCard = ({ title, icon: Icon, items, colorClass, bgClass, borderClass }) => {
        // Generates an Amazon search link for the vegetable seeds
        // Replace 'YOUR_AMAZON_TAG_HERE' with your actual Amazon Affiliate ID!
        const getAmazonLink = (itemName) => {
          const searchTerm = encodeURIComponent(itemName + ' seeds uk');
          const affiliateTag = 'frontosa-21'; 
          return `https://www.amazon.co.uk/s?k=${searchTerm}&tag=${affiliateTag}`;
        };

        return (
          <div className={`rounded-xl border-t-4 ${borderClass} ${bgClass} p-5 shadow-sm transition-all hover:shadow-md h-full flex flex-col`}>
            <div className="flex items-center gap-3 mb-4 pb-2 border-b border-white/40">
              <div className={`p-2 rounded-lg bg-white/60 text-${colorClass}-700 shadow-sm`}>
                <Icon size={22} className={`text-${colorClass}-600`} />
              </div>
              <h3 className={`font-bold text-lg text-${colorClass}-900`}>{title}</h3>
            </div>
            {items && items.length > 0 ? (
              <ul className="space-y-3 flex-grow">
                {items.map((item, idx) => (
                  <li key={idx}>
                    <a 
                      href={getAmazonLink(item.name)}
                      target="_blank"
                      rel="noopener noreferrer"
                      title={`Search for ${item.name} seeds on Amazon`}
                      className="flex items-center gap-3 bg-white/50 p-2 rounded-lg hover:bg-white hover:shadow-md transition-all cursor-pointer group"
                    >
                      <span className="text-2xl group-hover:scale-110 transition-transform" role="img" aria-label={item.name}>{item.icon}</span>
                      <span className="font-medium text-gray-800 text-sm md:text-base leading-tight group-hover:text-blue-600 transition-colors">
                        {item.name}
                      </span>
                    </a>
                  </li>
                ))}
              </ul>
            ) : (
              <div className="flex-grow flex items-center justify-center text-gray-500 italic p-4 bg-white/30 rounded-lg">
                Nothing to {title.toLowerCase()} this month.
              </div>
            )}
          </div>
        );
      };

      return (
        <div className="min-h-screen font-sans text-gray-800 selection:bg-green-200 pb-12 relative">
          
          {/* API Key Modal */}
          {showApiKeyModal && (
            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
              <div className="bg-white rounded-2xl shadow-xl max-w-md w-full p-6 animate-fade-in-up">
                <h3 className="text-xl font-bold text-gray-900 mb-2">Connect AI Assistant</h3>
                <p className="text-sm text-gray-600 mb-4">
                  To power the personalized AI features, you need a free Gemini API key. Your key is stored locally on your device and is never sent to our servers.
                </p>
                <input 
                  type="password" 
                  placeholder="Paste your API key here..."
                  value={apiKeyInput}
                  onChange={(e) => setApiKeyInput(e.target.value)}
                  className="w-full border border-gray-300 rounded-lg p-3 mb-4 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                />
                <div className="flex gap-3 justify-end">
                  <button onClick={() => setShowApiKeyModal(false)} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg font-medium">Cancel</button>
                  <button onClick={saveApiKeyAndContinue} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium shadow-sm transition-all">Save & Continue</button>
                </div>
                <p className="text-xs text-gray-400 mt-4 text-center">
                  Get a free key at <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-indigo-500 hover:underline">Google AI Studio</a>.
                </p>
              </div>
            </div>
          )}

          {/* Header */}
          <header className="bg-gradient-to-r from-green-800 to-emerald-600 text-white p-6 md:p-10 shadow-lg">
            <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-4">
                <div className="bg-white/20 p-3 rounded-2xl backdrop-blur-sm">
                  <IconCalendar size={40} className="text-white drop-shadow-md" />
                </div>
                <div>
                  <h1 className="text-3xl md:text-4xl font-extrabold tracking-tight drop-shadow-sm">Year-Round Sowing Planner</h1>
                  <p className="text-green-100 font-medium mt-1">Your illustrated guide to plotting, planting & picking.</p>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto p-4 md:p-8 -mt-6">
            <div className="bg-white rounded-2xl shadow-xl overflow-hidden mb-8">
              
              {/* Mobile Navigator */}
              <div className="flex items-center justify-between p-4 md:hidden bg-green-50">
                <button onClick={handlePrevMonth} className="p-2 bg-white rounded-full shadow-sm text-green-700 hover:bg-green-100 transition-colors">
                  <IconChevronLeft size={24} />
                </button>
                <h2 className="text-2xl font-bold text-green-800">{currentMonth}</h2>
                <button onClick={handleNextMonth} className="p-2 bg-white rounded-full shadow-sm text-green-700 hover:bg-green-100 transition-colors">
                  <IconChevronRight size={24} />
                </button>
              </div>

              {/* Desktop Navigator */}
              <div className="hidden md:flex overflow-x-auto no-scrollbar border-b border-gray-100">
                {months.map((month, idx) => (
                  <button
                    key={month}
                    onClick={() => setCurrentMonthIndex(idx)}
                    className={`flex-1 min-w-[100px] py-4 px-2 text-center text-sm lg:text-base font-bold transition-all duration-300 relative ${
                      idx === currentMonthIndex 
                        ? 'text-green-700 bg-green-50 shadow-inner' 
                        : 'text-gray-500 hover:bg-gray-50 hover:text-green-600'
                    }`}
                  >
                    {month}
                    {idx === currentMonthIndex && (
                      <div className="absolute bottom-0 left-0 w-full h-1 bg-green-500 rounded-t-full" />
                    )}
                  </button>
                ))}
              </div>

              {/* Content Area */}
              <div className="p-6 md:p-8 border-b border-gray-100">
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                  <ActionCard title="Sow Indoors" icon={IconSprout} items={data.sowIndoors} colorClass="orange" bgClass="bg-orange-50" borderClass="border-orange-400" />
                  <ActionCard title="Sow Outdoors" icon={IconSun} items={data.sowOutdoors} colorClass="green" bgClass="bg-green-50" borderClass="border-green-400" />
                  <ActionCard title="Plant Out" icon={IconTractor} items={data.plantOut} colorClass="blue" bgClass="bg-blue-50" borderClass="border-blue-400" />
                  <ActionCard title="Harvest" icon={IconBasket} items={data.harvest} colorClass="purple" bgClass="bg-purple-50" borderClass="border-purple-400" />
                </div>

                <div className="mt-8 bg-amber-50 border-l-4 border-amber-400 p-5 rounded-r-xl shadow-sm flex gap-4 items-start">
                  <div className="text-amber-500 flex-shrink-0 mt-0.5"><IconInfo size={24} /></div>
                  <div>
                    <h4 className="font-bold text-amber-900 mb-1">Gardener's Tip for {currentMonth}</h4>
                    <p className="text-amber-800 leading-relaxed">{data.tip}</p>
                  </div>
                </div>
              </div>

              {/* AI Assistant Section */}
              <div className="bg-gradient-to-br from-indigo-50 to-purple-50 p-6 md:p-8">
                <div className="flex items-center justify-between mb-6">
                  <div className="flex items-center gap-2">
                    <div className="text-indigo-600"><IconSparkles size={24} /></div>
                    <h3 className="text-2xl font-bold text-indigo-900">AI Garden Assistant</h3>
                  </div>
                  {localStorage.getItem('gemini_api_key') && (
                    <button onClick={clearApiKey} className="text-xs text-indigo-400 hover:text-indigo-700 underline">Reset API Key</button>
                  )}
                </div>

                <div className="flex flex-col sm:flex-row gap-4 mb-6">
                  <button 
                    onClick={() => executeAiAction('recipe')}
                    disabled={aiLoading}
                    className="flex-1 bg-white hover:bg-purple-50 text-purple-700 font-semibold py-3 px-4 border border-purple-200 rounded-xl shadow-sm transition-all flex items-center justify-center gap-2 hover:shadow-md disabled:opacity-50 disabled:cursor-not-allowed"
                  >
                    <IconChef size={20} />
                    ✨ Recipe from {currentMonth}'s Harvest
                  </button>
                  
                  <button 
                    onClick={() => executeAiAction('chores')}
                    disabled={aiLoading}
                    className="flex-1 bg-white hover:bg-indigo-50 text-indigo-700 font-semibold py-3 px-4 border border-indigo-200 rounded-xl shadow-sm transition-all flex items-center justify-center gap-2 hover:shadow-md disabled:opacity-50 disabled:cursor-not-allowed"
                  >
                    <IconList size={20} />
                    ✨ {currentMonth} Weekend Chore List
                  </button>
                </div>

                {aiLoading && (
                  <div className="bg-white/60 backdrop-blur-sm p-8 rounded-xl border border-indigo-100 text-center flex flex-col items-center justify-center">
                    <div className="animate-spin text-indigo-500 mb-3"><IconLoader size={32} /></div>
                    <p className="text-indigo-800 font-medium">Consulting the gardening almanac...</p>
                  </div>
                )}

                {aiError && !aiLoading && (
                  <div className="bg-red-50 p-6 rounded-xl border border-red-200 text-red-800">
                    <p>{aiError}</p>
                  </div>
                )}

                {aiResponse && !aiLoading && (
                  <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm border border-indigo-100 relative overflow-hidden">
                    <div className="absolute top-0 right-0 p-4 opacity-5 text-indigo-900 pointer-events-none">
                      <IconSparkles size={120} />
                    </div>
                    <div className="relative z-10">
                      {formatText(aiResponse)}
                    </div>
                  </div>
                )}
              </div>
            </div>

            {/* Legend */}
            <div className="flex flex-wrap items-center justify-center gap-6 text-sm text-gray-500">
              <div className="flex items-center gap-2"><div className="text-orange-500"><IconSprout size={16} /></div><span>Indoors/Under Glass</span></div>
              <div className="flex items-center gap-2"><div className="text-green-500"><IconSun size={16} /></div><span>Direct Sow</span></div>
              <div className="flex items-center gap-2"><div className="text-blue-500"><IconTractor size={16} /></div><span>Move to final spot</span></div>
              <div className="flex items-center gap-2"><div className="text-purple-500"><IconBasket size={16} /></div><span>Ready to eat!</span></div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
